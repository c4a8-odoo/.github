schema_version: 1
default_supported_path: 18.0->19.0

state_contract:
  required_keys:
    - repo
    - module
    - source_version
    - target_version
    - branch
    - repo_path
    - stage
    - status
    - state_file
  resume_stages:
    - ready_for_ai
    - ai_migration_done
    - tests_pending
    - tests_green
    - validation_pending
    - validation_green
    - manual_review_required

supported_paths:
  18.0->19.0:
    label: Odoo 18.0 to 19.0
    target_manifest_version: 19.0.1.0.0
    rules:
      - id: manifest.version.bump
        scope: manifest
        severity: required
        auto_apply: true
        summary: Bump the module version to the 19.0 baseline.
        detection:
          files:
            - __manifest__.py
          hints:
            - version
            - 18.0.
        action:
          kind: replace_version
          target: 19.0.1.0.0

      - id: cleanup.legacy.migrations
        scope: filesystem
        severity: required
        auto_apply: true
        summary: Remove legacy migrations directories copied from the source branch.
        detection:
          paths:
            - migrations/
        action:
          kind: delete_path
          target: migrations/

      - id: xml.request.type.jsonrpc
        scope: xml
        severity: required
        auto_apply: true
        summary: Replace type="json" with type="jsonrpc" in route declarations.
        detection:
          file_globs:
            - '**/*.py'
            - '**/*.xml'
          hints:
            - type="json"
        action:
          kind: replace_literal
          from: type="json"
          to: type="jsonrpc"

      - id: python.env.cursor
        scope: python
        severity: required
        auto_apply: false
        summary: Replace legacy self._cr access with self.env.cr.
        detection:
          file_globs:
            - '**/*.py'
          hints:
            - self._cr
        action:
          kind: replace_literal
          from: self._cr
          to: self.env.cr
        manual_review_reason: Verify the target object is still a model environment and not a lower-level cursor wrapper.

      - id: python.env.context
        scope: python
        severity: required
        auto_apply: false
        summary: Replace legacy self._context access with self.env.context.
        detection:
          file_globs:
            - '**/*.py'
          hints:
            - self._context
        action:
          kind: replace_literal
          from: self._context
          to: self.env.context
        manual_review_reason: Confirm the call site expects a mapping and not a copied context object.

      - id: python.env.uid
        scope: python
        severity: required
        auto_apply: false
        summary: Replace legacy self._uid usage with the appropriate env-based equivalent.
        detection:
          file_globs:
            - '**/*.py'
          hints:
            - self._uid
        action:
          kind: review_only
          recommendation: Use self.env.uid for the numeric user id or self.env.user for the record, depending on call-site semantics.
        manual_review_reason: The correct replacement varies by usage and should not be mass-applied blindly.

      - id: python.groups_id.group_ids
        scope: python
        severity: required
        auto_apply: false
        summary: Replace groups_id references with group_ids where the 19.0 API requires it.
        detection:
          file_globs:
            - '**/*.py'
            - '**/*.xml'
            - '**/*.csv'
          hints:
            - groups_id
        action:
          kind: review_only
          recommendation: Rename groups_id to group_ids only in places where the target model or record schema changed in 19.0.
        manual_review_reason: Some occurrences are business fields, not migration targets.

      - id: python.toggle_active.archive_actions
        scope: python
        severity: required
        auto_apply: false
        summary: Replace toggle_active with action_archive or action_unarchive.
        detection:
          file_globs:
            - '**/*.py'
          hints:
            - toggle_active
        action:
          kind: review_only
          recommendation: Split the call into explicit archive or unarchive behavior based on the original intent.
        manual_review_reason: Choosing the correct action depends on the runtime branch and prior active state.

      - id: python.read_group.deprecated
        scope: python
        severity: required
        auto_apply: true
        summary: Replace deprecated public read_group() calls with _read_group() in backend code.
        detection:
          file_globs:
            - '**/*.py'
          hints:
            - .read_group(
        action:
          kind: replace_regex
          pattern: '(?<!\w)\.read_group\('
          replacement: '._read_group('
          notes: >
            In 19.0, the public read_group() ORM method is deprecated and emits a DeprecationWarning.
            Use _read_group() for backend aggregation. Note that _read_group() returns a list of
            group dicts using field objects as keys instead of string field names, so call-site
            result processing must be updated accordingly. Use formatted_read_group() only when
            a fully formatted (display-ready) result is required.
        manual_review_reason: >
          The return format of _read_group() differs from read_group(): keys are field objects,
          not strings. Each call site must be individually updated to use the new key format.
          Auto-apply only renames the method; the result-processing code requires manual review.

      - id: python.domain.api
        scope: python
        severity: recommended
        auto_apply: false
        summary: Review remaining domain usages that should migrate to the modern Domain API in 19.0 beyond the auto-applied import and method-call replacements.
        detection:
          file_globs:
            - '**/*.py'
          hints:
            - domain=
        action:
          kind: review_only
          recommendation: Prefer modern Domain helpers when the target API or readability clearly benefits from it. Note that expression.AND/OR import and call-site replacements are handled automatically by python.imports.osv_expression_import and python.expression.method_calls.
        manual_review_reason: Domain rewrites can alter semantics and should be deliberate.

      - id: tests.demo.data
        scope: tests
        severity: required
        auto_apply: false
        summary: Adjust tests that implicitly rely on demo data no longer being installed by default.
        detection:
          file_globs:
            - tests/**/*.py
            - '**/*test*.py'
          hints:
            - env.ref(
            - demo
        action:
          kind: review_only
          recommendation: Create explicit fixtures or ensure the required records are installed by the test setup.
        manual_review_reason: Test data assumptions differ per module and require local fixture knowledge.

      - id: python.sql_constraints.models_constraint
        scope: python
        severity: required
        auto_apply: false
        summary: Replace _sql_constraints list with individual models.Constraint class attributes.
        detection:
          file_globs:
            - '**/*.py'
          hints:
            - _sql_constraints
        action:
          kind: review_only
          recommendation: >
            Replace each tuple in _sql_constraints with a named class-level
            attribute using models.Constraint. Example:
              _name_uniq = models.Constraint('unique(name)', 'Name must be unique!')
            Make sure 'models' is imported from odoo. The attribute name
            should be a short snake_case descriptor (e.g. _check_probability).
        manual_review_reason: >
          Each entry must be converted individually: the tuple (name, sql, message)
          becomes <attr_name> = models.Constraint(sql, message). The attribute
          name is chosen by the developer and is not derivable automatically.

      - id: python.translation.env_method
        scope: python
        severity: required
        auto_apply: false
        summary: Replace bare _() translation calls with self.env._() and remove the _ import from odoo.
        detection:
          file_globs:
            - '**/*.py'
          hints:
            - 'from odoo import _'
            - '_("'
            - "_(''"
        action:
          kind: review_only
          recommendation: >
            Remove _ from the 'from odoo import' statement. Replace every
            _("text") call in method bodies with self.env._("text"). In
            lambda defaults or places where self is not available, pass the
            translated string from the caller that has access to self.env.
        manual_review_reason: >
          Lambda defaults, classmethod bodies, and module-level code do not
          always have access to self. Each occurrence must be reviewed to
          ensure the env is available at the call site before applying
          self.env._().

      - id: python.imports.osv_expression_import
        scope: python
        severity: required
        auto_apply: true
        summary: Replace 'from odoo.osv import expression' with 'from odoo.fields import Domain'.
        detection:
          file_globs:
            - '**/*.py'
          hints:
            - from odoo.osv import expression
        action:
          kind: replace_literal
          from: from odoo.osv import expression
          to: from odoo.fields import Domain

      - id: python.expression.method_calls
        scope: python
        severity: required
        auto_apply: true
        summary: Replace expression.AND() and expression.OR() calls with Domain.AND() and Domain.OR().
        detection:
          file_globs:
            - '**/*.py'
          hints:
            - expression.AND(
            - expression.OR(
        action:
          kind: replace_regex
          pattern: 'expression\.(AND|OR)\('
          replacement: 'Domain.\1('

      - id: python.unlink.ondelete_decorator
        scope: python
        severity: required
        auto_apply: false
        summary: Replace unlink() validation guards with the @api.ondelete(at_uninstall=False) decorator.
        detection:
          file_globs:
            - '**/*.py'
          hints:
            - def unlink(self)
        action:
          kind: review_only
          recommendation: >
            Extract any UserError validation from unlink() into a separate
            method decorated with @api.ondelete(at_uninstall=False). Remove
            the unlink() override entirely unless it has side-effects beyond
            validation. The decorator method must NOT call super().unlink().
            Example:
              @api.ondelete(at_uninstall=False)
              def _unlink_if_draft(self):
                  for rec in self:
                      if rec.state != 'draft':
                          raise UserError(self.env._('Cannot delete.'))
        manual_review_reason: >
          The split between validation-only logic and other side-effects in
          unlink() requires manual judgement. Any logic beyond raising a
          UserError must be moved to write(), create(), or unlink hooks
          rather than converted to the decorator.

      - id: xml.search.group_expand_attrs
        scope: xml
        severity: required
        auto_apply: false
        summary: Remove 'expand' and 'string' attributes from <group> elements inside <search> views.
        detection:
          file_globs:
            - '**/*.xml'
          hints:
            - expand=
            - 'string="Group By'
        action:
          kind: review_only
          recommendation: >
            In XML <search> view arches, locate every <group expand="..."
            string="..."> element and remove the expand and string attributes,
            leaving only <group>. These attributes are no longer supported in
            Odoo 19.0 search views.
        manual_review_reason: >
          The attributes must be removed only from <group> elements that are
          direct children of <search>, not from unrelated uses of expand or
          string elsewhere in the file.

      - id: python.fields.auto_join_renamed
        scope: python
        severity: required
        auto_apply: true
        summary: Rename deprecated auto_join= field parameter to bypass_search_access=.
        detection:
          file_globs:
            - '**/*.py'
          hints:
            - auto_join=
        action:
          kind: replace_literal
          from: auto_join=
          to: bypass_search_access=

      - id: python.timezone.env_tz
        scope: python
        severity: recommended
        auto_apply: false
        summary: Review manual timezone lookups that should use the new self.env.tz property in 19.0.
        detection:
          file_globs:
            - '**/*.py'
          hints:
            - 'pytz.timezone'
            - "context.get('tz')"
        action:
          kind: review_only
          recommendation: >
            Replace patterns like pytz.timezone(self.env.context.get('tz', ...))
            or pytz.timezone(self.env.user.tz) with self.env.tz. The new
            env.tz property resolves the timezone automatically using the
            context, then the user's profile, then falling back to UTC.
        manual_review_reason: >
          Not all pytz.timezone calls are candidates for replacement; only
          those that resolve the current user's or context's timezone. Calls
          that use a fixed or explicitly passed timezone string must not be
          changed.

      - id: python.cache.ormcache_context
        scope: python
        severity: required
        auto_apply: false
        summary: Replace deprecated ormcache_context() with ormcache() and read context values directly.
        detection:
          file_globs:
            - '**/*.py'
          hints:
            - ormcache_context(
        action:
          kind: review_only
          recommendation: >
            Replace @tools.ormcache_context(...) with @tools.ormcache() and
            access context values inside the method body via
            self.env.context.get('key'). The cache key will no longer include
            context values automatically; add explicit key parameters to
            ormcache() if the cached value varies by context.
        manual_review_reason: >
          Each ormcache_context call must be reviewed to identify which
          context keys affect the cached value and whether those keys need to
          be promoted to explicit ormcache() parameters.

      - id: validation.post_migration.tests
        scope: workflow
        severity: required
        auto_apply: false
        summary: Run module tests after migration edits and before final validation.
        detection:
          hints:
            - tests_pending
        action:
          kind: invoke_skill
          skill: odoo-tests

      - id: validation.post_migration.module_check
        scope: workflow
        severity: required
        auto_apply: false
        summary: Run module validation after tests are green.
        detection:
          hints:
            - validation_pending
        action:
          kind: invoke_skill
          skill: odoo-validate-module